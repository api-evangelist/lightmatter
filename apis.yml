aid: lightmatter
name: Lightmatter
description: >-
  Lightmatter is a Mountain View, California photonic supercomputer company
  building optical interconnect and compute products for AI infrastructure.
  Its flagship Passage line of 3D-stacked photonic interposers and co-packaged
  optics, including the Passage M1000 superchip and the Passage L20 and L200
  pluggables, deliver up to 114 Tbps of optical bandwidth and target
  frontier-scale AI training and inference fabrics. Lightmatter also ships
  the Envise general-purpose photonic AI accelerator and the Guide VLSP
  Light Engine universal light source, and provides reference systems and
  evaluation kits. The company holds a 4.4 billion dollar valuation on
  roughly 850 million dollars raised as of late 2024 and partners with TSMC,
  GlobalFoundries, OIF, IEEE, and OCP. Lightmatter does not expose a public
  developer API, so this profile is hardware-, research-, and
  press-focused with an intentionally empty apis list.
